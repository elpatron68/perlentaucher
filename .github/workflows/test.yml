name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Neuere Action-Versionen nutzen Node.js 24 (statt deprecated Node 20 auf den Runnern).
# Self-hosted: GitHub Actions Runner >= 2.327.1 erforderlich (siehe actions/checkout v5).
jobs:
  test:
    # WICHTIG: Du musst einen Runner mit dem Label "self-hosted" oder "linux" registrieren
    # Siehe README für Anleitung zur Runner-Einrichtung
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check Python syntax
      run: |
        python -m py_compile perlentaucher.py

    - name: Test script help
      run: |
        python perlentaucher.py --help

    - name: Test script with dry-run (no actual downloads)
      run: |
        python perlentaucher.py --limit 1 --loglevel DEBUG --download-dir /tmp/test_downloads || true

